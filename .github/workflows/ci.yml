name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            autoconf automake libtool \
            devscripts debhelper fakeroot dh-autoreconf \
            librtlsdr-dev direwolf

      - name: Bootstrap autotools
        run: bash autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check

      - name: Generate test audio with Dire Wolf
        run: |
          mkdir -p testdata
          for rate in 8000 16000 32000 48000; do
            gen_packets -n 100 -r $rate -o testdata/test_${rate}.wav
          done

      - name: Benchmark against Dire Wolf
        run: |
          echo "=== Dire Wolf vs libaprs (gen_packets -n 100) ==="
          for f in testdata/test_*.wav; do
            rate=$(basename $f | grep -oP '\d+')
            dw=$(atest "$f" 2>&1 | grep -oP '^\d+ packets' | grep -oP '^\d+')
            us=$(./examples/aprs_decode "$f" 2>&1 | grep -oP '^\d+ packets' | grep -oP '^\d+')
            echo "${rate}Hz: DireWolf=${dw} libaprs=${us}"
          done

      - name: Build Debian packages
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64
          path: dist/*
